        - generic [ref=e196]:
          - paragraph [ref=e197]:
            - text: We uses API keys to allow access to the API. You can register a new API key in our
            - link "dashboard" [ref=e198] [cursor=pointer]:
              - /url: https://dashboard.api-football.com/register
            - text: .
          - paragraph [ref=e199]:
            - strong [ref=e200]: API-SPORTS
            - text: ":"
            - link "https://v3.football.api-sports.io/" [ref=e201] [cursor=pointer]:
              - /url: https://v3.football.api-sports.io/
          - paragraph [ref=e202]: "Our API expects for the API key to be included in all API requests to the server in a header that looks like the following:"
          - blockquote [ref=e203]:
            - paragraph [ref=e204]:
              - text: Make sure to replace
              - code [ref=e205]: XxXxXxXxXxXxXxXxXxXxXxXx
              - text: with your API key.
          - paragraph [ref=e206]:
            - strong [ref=e207]: REQUESTS HEADERS & CORS
          - paragraph [ref=e208]:
            - text: The API is configured to work only with
            - strong [ref=e209]: GET
            - text: "requests and allows only the headers listed below:"
          - list [ref=e210]:
            - listitem [ref=e211]:
              - code [ref=e212]: x-apisports-key
          - paragraph [ref=e213]: If you make non-GET requests or add headers that are not in the list, you will receive an error from the API.
          - paragraph [ref=e214]:
            - text: Some frameworks
            - emphasis [ref=e215]: (especially in JS, nodeJS..)
            - text: automatically add extra headers, you have to make sure to remove them in order to get a response from the API.
