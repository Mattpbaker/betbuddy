            - text: odds/live
          - generic [ref=e7986]:
            - paragraph [ref=e7987]: This endpoint returns in-play odds for fixtures in progress.
            - paragraph [ref=e7988]:
              - text: Fixtures are added between 15 and 5 minutes before the start of the fixture. Once the fixture is over they are removed from the endpoint between 5 and 20 minutes.
              - strong [ref=e7989]: No history is stored
              - text: . So fixtures that are about to start, fixtures in progress and fixtures that have just ended are available in this endpoint.
            - paragraph [ref=e7990]:
              - strong [ref=e7991]: Update Frequency
              - text: ": This endpoint is updated every 5 seconds."
              - code [ref=e7992]: "*"
            - paragraph [ref=e7993]:
              - code [ref=e7994]: "* This value can change in the range of 5 to 60 seconds"
            - paragraph [ref=e7995]:
              - strong [ref=e7996]: INFORMATIONS ABOUT STATUS
            - code [ref=e7998]: "\"status\": { \"stopped\": false, // True if the fixture is stopped by the referee for X reason \"blocked\": false, // True if bets on this fixture are temporarily blocked \"finished\": false // True if the fixture has not started or if it is finished },"
            - paragraph [ref=e7999]:
              - strong [ref=e8000]: INFORMATIONS ABOUT VALUES
            - paragraph [ref=e8001]:
              - text: When several identical values exist for the same bet the
              - code [ref=e8002]: main
              - text: field is set to
              - code [ref=e8003]: "True"
              - text: for the bet being considered, the others will have the value
              - code [ref=e8004]: "False"
              - text: .
            - paragraph [ref=e8005]:
              - text: The
              - code [ref=e8006]: main
              - text: field will be set to
              - code [ref=e8007]: "True"
              - text: only if several identical values exist for the same bet.
            - paragraph [ref=e8008]:
              - text: When a value is unique for a bet the
              - code [ref=e8009]: main
              - text: value will always be
              - code [ref=e8010]: "False"
              - text: or
              - code [ref=e8011]: "null"
              - text: .
            - paragraph [ref=e8012]:
              - strong [ref=e8013]: Example below
              - text: ":"
            - code [ref=e8015]: "\"id\": 36, \"name\": \"Over/Under Line\", \"values\": [ { \"value\": \"Over\", \"odd\": \"1.975\", \"handicap\": \"2\", \"main\": true, // Bet to consider \"suspended\": false // True if this bet is temporarily suspended }, { \"value\": \"Over\", \"odd\": \"3.45\", \"handicap\": \"2\", \"main\": false, // Bet to no consider \"suspended\": false }, ]"
