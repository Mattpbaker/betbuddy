          - generic [ref=e1442]:
            - paragraph [ref=e1443]: Get the list of available leagues and cups.
            - paragraph [ref=e1444]:
              - text: The league
              - code [ref=e1445]: id
              - text: are
              - strong [ref=e1446]: unique
              - text: in the API and leagues keep it across all
              - code [ref=e1447]: seasons
            - paragraph [ref=e1448]:
              - text: "To get the logo of a competition you have to call the following url:"
              - code [ref=e1449]: "https://media.api-sports.io/football/leagues/{league_id}.png"
            - paragraph [ref=e1450]:
              - text: This endpoint also returns the
              - code [ref=e1451]: coverage
              - text: of each competition, which makes it possible to know what is available for that league or cup.
            - paragraph [ref=e1452]:
              - text: The values returned by the coverage indicate the
              - strong [ref=e1453]: data available at the moment
              - text: you call the API, so for a competition that has not yet started, it is normal to have all the features set to
              - code [ref=e1454]: "False"
              - text: . This will be updated once the competition has started.
            - blockquote [ref=e1455]:
              - paragraph [ref=e1456]:
                - text: You can find all the leagues ids on our
                - link "Dashboard" [ref=e1457] [cursor=pointer]:
                  - /url: https://dashboard.api-football.com/soccer/ids
                - text: .
            - paragraph [ref=e1458]:
              - strong [ref=e1459]: "Example :"
            - code [ref=e1461]: "\"coverage\": { \"fixtures\": { \"events\": true, \"lineups\": true, \"statistics_fixtures\": false, \"statistics_players\": false }, \"standings\": true, \"players\": true, \"top_scorers\": true, \"top_assists\": true, \"top_cards\": true, \"injuries\": true, \"predictions\": true, \"odds\": false }"
            - paragraph [ref=e1462]:
              - text: "In this example we can deduce that the competition does not have the following features:"
              - code [ref=e1463]: statistics_fixtures
              - text: ","
              - code [ref=e1464]: statistics_players
              - text: ","
              - code [ref=e1465]: odds
              - text: because it is set to
              - code [ref=e1466]: "False"
              - text: .
            - paragraph [ref=e1467]:
              - text: The coverage of a competition can vary from season to season and values set to
              - code [ref=e1468]: "True"
              - text: do not guarantee 100% data availability.
            - paragraph [ref=e1469]:
              - text: Some competitions, such as the
              - code [ref=e1470]: friendlies
              - text: ", are exceptions to the coverage indicated in the"
              - code [ref=e1471]: leagues
              - text: endpoint, and the data available may differ depending on the match, including livescore, events, lineups, statistics and players.
            - paragraph [ref=e1472]: Competitions are automatically renewed by the API when a new season is available. There may be a delay between the announcement of the official calendar and the availability of data in the API.
            - paragraph [ref=e1473]:
              - text: For
              - code [ref=e1474]: Cup
              - text: competitions, fixtures are automatically added when the two participating teams are known. For example if the current phase is the 8th final, the quarter final will be added once the teams playing this phase are known.
