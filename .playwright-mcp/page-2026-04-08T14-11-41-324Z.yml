            - strong [ref=e815]: 115 200 requests
            - text: .
          - paragraph [ref=e816]:
            - text: By implementing a caching system, even with a very short duration, such as
            - strong [ref=e817]: 60 seconds
            - text: ", you can drastically reduce the number of requests. The first visit will trigger an API request, but the response will then be cached for the next 60 seconds. This means that if 80 visitors access the same page within that time frame,"
            - strong [ref=e818]: only the first request
            - text: will reach the API, while the next 79 will be served directly from the cache.
