        - generic [ref=e810]:
          - paragraph [ref=e811]: By using Widgets, each visit to a page on your website triggers one or more API requests to retrieve data. Without a caching system, your daily quota can be reached very quickly.
          - paragraph [ref=e812]:
            - strong [ref=e813]: "Example:"
            - text: If a page triggers a single API request per visitor and you receive 80 visits to that page in one minute, this results in
            - strong [ref=e814]: 80 API requests
